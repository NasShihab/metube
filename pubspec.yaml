name: metube
description: A new Flutter project.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=2.17.1 <3.0.0"

dependencies:

  flutter_screenutil: ^5.6.0
  pin_code_fields: ^7.4.0
  flutter_riverpod: ^2.1.1

  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^2.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Cantarell
      fonts:
        - asset: assets/fonts/Cantarell-Regular.ttf